<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ADG Marketing Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/shared.css">
    <style>
        /* Login — full page centered form, no sidebar */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e2e8f0;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1rem;
        }

        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.25rem;
        }

        .login-logo p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .login-card label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 0.4rem;
        }

        .login-card input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0.5rem;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .login-card input:focus {
            border-color: #6366f1;
        }

        .login-card input::placeholder {
            color: #64748b;
        }

        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .register-link a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">📚</div>
                <h1>ADG Marketing Hub</h1>
                <p>Knowledge Management System</p>
            </div>

            <!-- Error alerts -->
            <div id="errorAlert" class="alert alert-error">
                <span id="errorMessage"></span>
            </div>
            <div id="whitelistAlert" class="alert alert-warning">
                ⚠️ Email <strong id="whitelistEmail"></strong> chưa được cấp quyền truy cập.
                Liên hệ Admin để được thêm vào hệ thống.
            </div>

            <!-- Google Login Button -->
            <a href="/api/v1/rbac/login" class="google-btn" id="loginBtn">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Đăng nhập bằng Google
            </a>

            <div class="divider">Thông tin</div>

            <p class="info-text">
                Chỉ tài khoản được <strong>Admin phê duyệt</strong> mới có thể đăng nhập.
                Hệ thống sử dụng Google Account để xác thực.
            </p>
        </div>

        <div class="login-footer">
            <a href="/">← Về trang chủ</a>
        </div>
    </div>

    <script>
        // Check URL params for errors
        const params = new URLSearchParams(window.location.search);

        if (params.get('error') === 'not_whitelisted') {
            const email = params.get('email') || '';
            document.getElementById('whitelistAlert').classList.add('show');
            document.getElementById('whitelistEmail').textContent = email;
        } else if (params.get('error')) {
            document.getElementById('errorAlert').classList.add('show');
            document.getElementById('errorMessage').textContent =
                '❌ Lỗi đăng nhập: ' + decodeURIComponent(params.get('error'));
        }

        // Check if already logged in
        fetch('/api/v1/rbac/check', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                if (data.authenticated) {
                    window.location.href = '/admin/users';
                }
            })
            .catch(() => { });
    </script>
</body>

</html>
